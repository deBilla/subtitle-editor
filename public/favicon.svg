<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c6ff7"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Film frame notches (top) -->
  <rect x="4"  y="3" width="4" height="4" rx="1" fill="white" opacity="0.9"/>
  <rect x="10" y="3" width="4" height="4" rx="1" fill="white" opacity="0.9"/>
  <rect x="18" y="3" width="4" height="4" rx="1" fill="white" opacity="0.9"/>
  <rect x="24" y="3" width="4" height="4" rx="1" fill="white" opacity="0.9"/>

  <!-- Film frame notches (bottom) -->
  <rect x="4"  y="25" width="4" height="4" rx="1" fill="white" opacity="0.9"/>
  <rect x="10" y="25" width="4" height="4" rx="1" fill="white" opacity="0.9"/>
  <rect x="18" y="25" width="4" height="4" rx="1" fill="white" opacity="0.9"/>
  <rect x="24" y="25" width="4" height="4" rx="1" fill="white" opacity="0.9"/>

  <!-- Subtitle lines -->
  <rect x="5" y="14" width="14" height="2.5" rx="1.25" fill="white" opacity="0.95"/>
  <rect x="5" y="18.5" width="10" height="2.5" rx="1.25" fill="white" opacity="0.7"/>
</svg>
